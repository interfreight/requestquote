<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interfreight - Request for Freight Quotation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fa;
    color:#333;
}

/* HERO */

.hero{
    background:
    linear-gradient(
        rgba(13,59,102,.88),
        rgba(13,59,102,.88)
    ),
    url('cargo-background.jpg');

    background-size:cover;
    background-position:center;
    color:white;
    text-align:center;
    padding:60px 20px;
}

.hero img{
    width:140px;
    margin-bottom:15px;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
    opacity:.95;
}

/* CONTAINER */

.container{
    max-width:1100px;
    margin:-40px auto 50px;
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.12);
}

/* HEADER */

.form-header{
    background:#0D3B66;
    color:#fff;
    padding:25px;
}

.form-header h2{
    font-size:24px;
}

/* FORM */

.form-section{
    padding:35px;
}

.section-title{
    color:#0D3B66;
    margin-bottom:20px;
    border-left:5px solid #F4C430;
    padding-left:12px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #d8d8d8;
    border-radius:8px;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#3D73C9;
    box-shadow:0 0 0 3px rgba(61,115,201,.15);
}

.checkbox-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

.checkbox-grid label{
    font-weight:400;
}

.submit-area{
    text-align:center;
    margin-top:30px;
}

.submit-btn{
    background:#0D3B66;
    color:white;
    border:none;
    padding:15px 40px;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#3D73C9;
}

.footer-note{
    background:#f9fafb;
    padding:20px;
    text-align:center;
    color:#666;
    font-size:14px;
}

</style>

</head>

<body>

<section class="hero">


<img src="C:\Users\mis_a\Desktop\3. INTERFREIGHT COMPANY LOGO.png" alt="Interfreight Logo">

<h1>INTERFREIGHT GROUP</h1>

<p>
    Sea Freight • Air Freight • Customs Brokerage •
    Warehousing • Land Transport
</p>

</section>

<div class="container">

```
<div class="form-header">
    <h2>Request for Freight Quotation</h2>
</div>

<div class="form-section">

    <h3 class="section-title">Company Information</h3>

    <div class="grid">

        <div class="form-group">
            <label>Company *</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Title</label>
            <select>
                <option>Mr.</option>
                <option>Ms.</option>
                <option>Mrs.</option>
            </select>
        </div>

        <div class="form-group">
            <label>Contact Person *</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Mobile Number *</label>
            <input type="text">
        </div>

        <div class="form-group">
            <label>Email *</label>
            <input type="email">
        </div>

        <div class="form-group">
            <label>Preferred Contact Method</label>
            <select>
                <option>Phone Call</option>
                <option>WhatsApp</option>
                <option>Email</option>
            </select>
        </div>

    </div>

    <br>

    <h3 class="section-title">Required Services</h3>

    <div class="checkbox-grid">

        <label><input type="checkbox"> Sea Freight (LCL & FCL)</label>
        <label><input type="checkbox"> Air Freight</label>
        <label><input type="checkbox"> RoRo Services</label>
        <label><input type="checkbox"> Custom Brokerage</label>
        <label><input type="checkbox"> Warehouse & Distribution</label>
        <label><input type="checkbox"> Land Transport</label>
        <label><input type="checkbox"> Relocation Services</label>
        <label><input type="checkbox"> Project Cargo / OOG Cargo</label>
        <label><input type="checkbox"> Used Container Purchases</label>
        <label><input type="checkbox"> Marine Insurance</label>

    </div>

    <br>

    <h3 class="section-title">Shipment Details</h3>

    <div class="grid">

        <div class="form-group">
            <label>Shipment Type</label>
            <select>
                <option>Import</option>
                <option>Export</option>
            </select>
        </div>

        <div class="form-group">
            <label>Mode of Shipment</label>
            <select>
                <option>FCL</option>
                <option>LCL</option>
                <option>Bulk Cargo</option>
            </select>
        </div>

        <div class="form-group">
            <label>Commodity</label>
            <select>
                <option>General Cargo</option>
                <option>DG Cargo</option>
                <option>Reefer Cargo</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Incoterms</label>
            <select>
                <option>EXW</option>
                <option>FOB</option>
                <option>CIF</option>
                <option>DAP</option>
                <option>DDP</option>
            </select>
        </div>

    </div>

    <h3 class="section-title">Additional Information</h3>

    <div class="form-group">
        <label>Other Services</label>
        <textarea rows="3"></textarea>
    </div>

    <div class="form-group">
        <label>Remark Message</label>
        <textarea rows="5"></textarea>
    </div>

    <div class="submit-area">
        <button class="submit-btn">
            Submit Quotation Request
        </button>
    </div>

</div>

<div class="footer-note">
    © 2026 Interfreight Group. All Rights Reserved.
</div>
```

</body>
</html>
